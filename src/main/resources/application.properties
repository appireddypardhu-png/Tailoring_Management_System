spring.application.name=Tailoring
spring.datasource.url=${SPRING_DATASOURCE_URL}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

# Enable debug logging for application security/JWT diagnostics
logging.level.com.project.Tailoring=INFO

# Performance and startup optimizations
# Defer bean creation until first needed (reduces startup time & memory)
spring.main.lazy-initialization=true

# Defer datasource initialization until JPA is ready
spring.jpa.defer-datasource-initialization=true

# Avoid expensive JDBC metadata checks during bootstrap
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Reduce noisy SQL output
spring.jpa.show-sql=false

# Disable banner to slightly reduce startup logging
spring.main.banner-mode=off

# Cloudinary: keep enabled by default but bean creation is lazy
cloudinary.enabled=true

server.port=8080

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
